<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1: Nền tảng AJAX cơ bản</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        #info {
            border: 2px solid #4CAF50;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Bài 1: Xây dựng nền tảng giao tiếp bất đồng bộ</h1>
    <button onclick="loadContent()">Tải nội dung từ máy chủ</button>
    <div id="info">Nội dung sẽ được thay thế</div>
    
    <script src="ajax.js"></script>
</body>
</html>
